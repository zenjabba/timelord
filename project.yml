name: Timelord
options:
  bundleIdPrefix: com.digitalmonks.timelord
  deploymentTarget:
    iOS: "17.0"
    watchOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: 9Y6C5MKG87
    CODE_SIGN_STYLE: Automatic

packages:
  TimelordKit:
    path: TimelordKit

targets:
  Timelord:
    type: application
    platform: iOS
    sources:
      - path: Timelord
    resources:
      - path: Timelord/Resources
    dependencies:
      - package: TimelordKit
      - target: TimelordWidgets
      - target: TimelordWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.digitalmonks.timelord.app
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        INFOPLIST_KEY_CFBundleDisplayName: DM Time Lord
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 6
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortraitUpsideDown"
        INFOPLIST_KEY_NSCalendarsUsageDescription: "Timelord imports your calendar events as time entries"
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Timelord imports your calendar events as time entries"
        SUPPORTS_MACCATALYST: false
        INFOPLIST_KEY_UIBackgroundModes: "remote-notification"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_NSSupportsLiveActivities: true
    entitlements:
      path: Timelord/Timelord.entitlements
      properties:
        com.apple.developer.icloud-container-identifiers:
          - "iCloud.com.digitalmonks.timelord.app"
        com.apple.developer.icloud-services:
          - "CloudKit"
        com.apple.security.application-groups:
          - "group.com.digitalmonks.timelord.app"

  TimelordWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: TimelordWidgets
    dependencies:
      - package: TimelordKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.digitalmonks.timelord.app.widgets
        INFOPLIST_FILE: TimelordWidgets/Info.plist
        GENERATE_INFOPLIST_FILE: false
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 6
    entitlements:
      path: TimelordWidgets/TimelordWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - "group.com.digitalmonks.timelord.app"

  TimelordWatch:
    type: application
    platform: watchOS
    deploymentTarget:
      watchOS: "26.0"
    sources:
      - path: TimelordWatch
    dependencies:
      - package: TimelordKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.digitalmonks.timelord.app.watch
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        GENERATE_INFOPLIST_FILE: true
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 6
        SUPPORTS_MACCATALYST: false
        INFOPLIST_KEY_CFBundleDisplayName: DM Time Lord
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.digitalmonks.timelord.app
    entitlements:
      path: TimelordWatch/TimelordWatch.entitlements
      properties:
        com.apple.security.application-groups:
          - "group.com.digitalmonks.timelord.app"

  TimelordTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TimelordTests
    dependencies:
      - target: Timelord
      - package: TimelordKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.digitalmonks.timelord.app.tests
        GENERATE_INFOPLIST_FILE: true
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Timelord.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Timelord"
        BUNDLE_LOADER: "$(TEST_HOST)"
